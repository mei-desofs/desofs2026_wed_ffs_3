# JWT — fixed values for test environment only
jwt.secret=test-secret-key-for-unit-tests-only-never-use-in-prod
jwt.expiration=3600

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cafeteriadb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# File system base directory for tests
app.filesystem.base-dir=${java.io.tmpdir}/cafeteria-test-files
