spring.application.name=cafeteria-management

# JWT — secret loaded from JWT_SECRET env var; expiration in seconds (1 hour)
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-must-be-overridden-in-production-32ch}
jwt.expiration=3600

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cafeteriadb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cafeteria}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cafeteria_pass}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8081

# File system base directory for cafeteria file operations
app.filesystem.base-dir=${APP_FILESYSTEM_BASE_DIR:/tmp/cafeteria-files}
