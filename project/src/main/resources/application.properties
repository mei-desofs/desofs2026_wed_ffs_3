spring.application.name=cafeteria-management

# JWT — secret loaded from JWT_SECRET env var; expiration in seconds (1 hour)
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-must-be-overridden-in-production-32ch}
jwt.expiration=3600

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cafeteriadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Data initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

server.port=8081