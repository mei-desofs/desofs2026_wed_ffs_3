name: SCA - Software Composition Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency-Check
        run: mvn dependency-check:check -Dnvd.api.key=${{ secrets.NVD_API_KEY }}
        continue-on-error: true
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: project/target/dependency-check-report.*
