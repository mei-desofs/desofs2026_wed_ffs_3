name: SAST - Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: Build project for CodeQL
        run: mvn compile -f project/pom.xml
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  spotbugs:
    name: SpotBugs - Find Security Bugs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run SpotBugs with Find Security Bugs
        run: mvn compile spotbugs:spotbugs
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: project/target/spotbugsXml.xml
