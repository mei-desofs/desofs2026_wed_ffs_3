name: DAST - Dynamic Analysis (OWASP ZAP)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start application stack with Docker Compose
        run: docker compose up -d --build
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start on port 8081..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/ || true)
            if [ "$STATUS" != "000" ]; then
              echo "App is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i/60 - not ready yet, waiting 3s..."
            sleep 3
          done

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run ZAP Baseline Scan
        run: |
          docker run --network host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8081 \
            -r zap-report.html \
            -J zap-report.json \
            -I
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down
