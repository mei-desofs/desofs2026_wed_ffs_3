name: DAST - Dynamic Analysis (OWASP ZAP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build application (skip tests)
        run: mvn package -DskipTests -f project/pom.xml
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Start application in background
        run: |
          java -jar project/target/*.jar &
          echo "APP_PID=$!" >> $GITHUB_ENV
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod
          SERVER_PORT: 8081

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start on port 8081..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/ || true)
            if [ "$STATUS" != "000" ]; then
              echo "App is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i/30 - not ready yet, waiting 2s..."
            sleep 2
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://host.docker.internal:8081'
          allow_issue_writing: false
          fail_action: false
          cmd_options: '-a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
