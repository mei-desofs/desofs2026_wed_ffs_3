name: CI - Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests with JaCoCo coverage
        run: mvn verify
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: project/target/site/jacoco/

      - name: Upload Surefire test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-results
          path: project/target/surefire-reports/

  mutation-testing:
    name: Mutation Testing (PITest)
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run PITest mutation testing
        run: mvn test-compile org.pitest:pitest-maven:mutationCoverage
        env:
          JWT_SECRET: ci-pipeline-test-secret-key-never-use-in-prod

      - name: Upload PITest mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-mutation-report
          path: project/target/pit-reports/
